<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windward Line | MLB Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-bar">
        <div class="logo">WINDWARD LINE <span>// MLB PLAYOFF TERMINAL</span></div>
        <div class="status-indicator">
            <span class="pulse"></span> LIVE DATA STREAM
        </div>
    </header>

    <main class="dashboard">
        <section class="panel sandbox">
            <h2>SCENARIO SIMULATOR</h2>
            <div class="sandbox-controls">
                <div class="control-group">
                    <label>WINNER:</label>
                    <select id="sim-winner">
                        <option value="">-- Select Team --</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>LOSER:</label>
                    <select id="sim-loser">
                        <option value="">-- Select Team --</option>
                    </select>
                </div>
                <button onclick="runSimulation()" class="sim-btn">RUN SIMULATION</button>
                <button onclick="resetSimulation()" class="reset-btn">RESET</button>
            </div>
        </section>

        <div id="standings-grid" class="standings-grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
