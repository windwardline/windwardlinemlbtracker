<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windward Line | MLB Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-bar">
        <div class="logo">WINDWARD LINE <span>// MLB PLAYOFF TERMINAL</span></div>
        <div class="status-indicator" id="global-status">
            <span class="pulse"></span> SYSTEM ONLINE
        </div>
    </header>

    <main class="dashboard">
        
        <section class="panel live-feed-panel">
            <div class="live-panel-header">
                <h2>LIVE TICK DATA STREAM</h2>
                <select id="live-game-select" onchange="switchLiveGame()" style="display: none;"></select>
            </div>
            <div id="live-feed-container" class="live-feed-container">
                <div class="loading">Scanning MLB network for active signals...</div>
            </div>
        </section>

        <section class="panel sandbox">
            <h2>REAL SCHEDULE SIMULATOR</h2>
            <div class="sandbox-controls">
                <div class="control-group">
                    <label>SELECT TEAM TO SIMULATE:</label>
                    <select id="sim-team" onchange="loadTeamSchedule()">
                        <option value="">-- Awaiting Data --</option>
                    </select>
                </div>
                <button onclick="resetAllSimulations()" class="reset-btn">RESET ALL</button>
            </div>
            
            <div id="schedule-ticker" class="schedule-ticker">
                <div class="loading" style="display: none;" id="schedule-loading">Loading schedule...</div>
            </div>
        </section>

        <div id="standings-grid" class="standings-grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
